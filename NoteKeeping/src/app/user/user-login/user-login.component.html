<div class="login-page flex-center full-screen">
  <div class="glass-card login-card animate-fade-in">
    <div class="header-section">
      <div class="logo-icon">
        <i class="fa-solid fa-note-sticky"></i>
      </div>
      <h1>Welcome Back</h1>
      <p>Enter your credentials to access your notes</p>
    </div>

    <div class="error-alert animate-fade-in" *ngIf="error">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>{{ error }}</span>
    </div>

    <form [formGroup]="loginForm" (submit)="submit()" class="login-form">
      <div class="input-group">
        <label class="input-label" for="userName">Username</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user icon"></i>
          <input type="text" placeholder="Enter Username" id="userName" required formControlName="userName">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" placeholder="Enter Password" id="password" required formControlName="password">
        </div>
      </div>

      <div class="form-footer">
        <label class="checkbox-container">
          <input type="checkbox" name="remember">
          <span class="checkmark"></span>
          Remember me
        </label>
        <a class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" [disabled]="!loginForm.valid">
        <span>Login</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="signup-prompt">
        Not a member? <a routerLink="/register">Register here!</a>
      </div>
    </form>
  </div>
</div>
