<div class="register-page flex-center full-screen">
  <div class="glass-card register-card animate-fade-in">
    <div class="header-section">
      <div class="logo-icon">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      <h1>Create Account</h1>
      <p>Join us to start keeping your notes secure</p>
    </div>

    <div class="error-alert animate-fade-in" *ngIf="error">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>{{ error }}</span>
    </div>

    <form [formGroup]="registerForm" (submit)="submit()" class="register-form">
      <div class="input-group">
        <label class="input-label" for="userName">Username</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user icon"></i>
          <input type="text" placeholder="Choose a username" id="userName" required formControlName="userName">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope icon"></i>
          <input type="email" placeholder="Enter your email" id="email" required formControlName="email">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" placeholder="Create a password" id="password" required formControlName="password">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-shield-halved icon"></i>
          <input type="password" placeholder="Confirm your password" id="confirmPassword" required
            formControlName="confirmPassword">
        </div>
      </div>

      <button type="submit" [disabled]="!registerForm.valid">
        <span>Create Account</span>
        <i class="fa-solid fa-user-check"></i>
      </button>

      <div class="login-prompt">
        Already have an account? <a routerLink="/login">Login here!</a>
      </div>
    </form>
  </div>
</div>
